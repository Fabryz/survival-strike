<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Strike - Tactical RTS</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden;  
            font-family: Arial, sans-serif;
        }
        canvas { 
            display: block; 
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 100;
        }
        #selection-box {
            position: absolute;
            border: 2px solid rgba(0, 255, 0, 0.8);
            background-color: rgba(0, 255, 0, 0.1);
            pointer-events: none;
            display: none;
            z-index: 50;
        }
        .unselectable {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>
<body>
    <div id="hud" class="unselectable"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
